# Full stack in containers (review / production-like): Postgres + API + React UI.
#   pnpm compose:up   or   docker compose up --build
#   UI: http://localhost:5173   API: http://localhost:3000
#
# Local dev (hot reload): Postgres in Docker, API + Vite on the host — see root `pnpm dev`.

services:
  db:
    image: postgres:16
    container_name: rounds_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rounds_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rounds_monitor"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/rounds_monitor
      PORT: "3000"
      # Opt-in scheduler; API can run without it when scaling to multiple instances.
      ENABLE_SCREENSHOT_WORKER: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persist screenshot files on the host (Puppeteer writes under data/screenshots).
      - ./apps/api/data:/app/apps/api/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Browser uses host port 3000 (same mapping as local API).
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:3000"
    environment:
      PORT: "3000"
    depends_on:
      - api

volumes:
  postgres_data:
